name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-2
  AWS_ROLE_TO_ASSUME: arn:aws:iam::861556843635:role/ReCircleGitHubActionsDeployRole
  VITE_API_BASE: https://d3pcaip4rz2naa.cloudfront.net
  FRONTEND_BUCKET: circular-commerce-frontend-anvesh
  FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: E39ZXFJXVW69R7

jobs:
  backend-check:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend syntax
        run: find src -name "*.js" -print0 | xargs -0 -n1 node -c

      - name: Run backend tests
        run: npm test -- --passWithNoTests

  frontend-check:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_BASE }}
        run: npm run build

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Elastic Beanstalk CLI
        run: pip install awsebcli

      - name: Configure Elastic Beanstalk project
        run: |
          mkdir -p .elasticbeanstalk
          cat > .elasticbeanstalk/config.yml <<'EOF'
          branch-defaults:
            default:
              environment: circular-commerce-env
              group_suffix: null
          global:
            application_name: circular-commerce-platform
            branch: null
            default_ec2_keyname: null
            default_platform: Node.js 24 running on 64bit Amazon Linux 2023
            default_region: ap-south-2
            include_git_submodules: true
            instance_profile: null
            platform_name: null
            platform_version: null
            profile: null
            repository: null
            sc: null
            workspace_type: Application
          EOF

      - name: Deploy backend to Elastic Beanstalk
        run: eb deploy circular-commerce-env

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_BASE }}
        run: npm run build

      - name: Install backend dependencies for upload script
        working-directory: backend
        run: npm ci

      - name: Upload frontend to S3
        working-directory: backend
        run: node scripts/upload-frontend-s3.js

      - name: Invalidate frontend CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ env.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
